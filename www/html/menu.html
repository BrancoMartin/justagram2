<div id="justagram-menu-overlay" style="
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.7);
    z-index: 9999999;
    display: none;
    align-items: center;
    justify-content: center;
">
    <div id="justagram-menu" style="
        background: #262626;
        border-radius: 16px;
        width: 90%;
        max-width: 360px;
        max-height: 80vh;
        overflow-y: auto;
        padding: 20px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    ">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="color: white; margin: 0; font-size: 18px; font-weight: 600;">JustAgram Settings</h2>
            <div id="justagram-close-btn" style="
                width: 32px;
                height: 32px;
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                border-radius: 50%;
                background: #363636;
            ">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="#8e8e8e">
                    <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                </svg>
            </div>
        </div>

        <p style="color: #8e8e8e; font-size: 13px; margin: 0 0 16px 0;">Hide distracting content</p>

        <div class="justagram-toggle-item" data-key="hideReels" style="
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid #363636;
        ">
            <div>
                <div style="color: white; font-size: 15px;">Reels</div>
                <div style="color: #8e8e8e; font-size: 12px;">Hide Reels tab and content</div>
            </div>
            <label style="position: relative; display: inline-block; width: 48px; height: 28px;">
                <input type="checkbox" checked style="opacity: 0; width: 0; height: 0;">
                <span class="justagram-slider" style="
                    position: absolute;
                    cursor: pointer;
                    top: 0; left: 0; right: 0; bottom: 0;
                    background-color: #363636;
                    transition: .3s;
                    border-radius: 28px;
                "></span>
            </label>
        </div>
