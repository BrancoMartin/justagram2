name: Build iOS App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Bun
        uses: oven-sh/setup-bun@v1

      - name: Install Dependencies
        run: bun install

      - name: Build Web Assets
        run: bun run build

      - name: Sync iOS
        run: npx cap sync ios

      - name: Build iOS App
        run: |
          cd ios/App
          xcodebuild \
            -scheme App \
            -archivePath build/App.xcarchive \
            -configuration Release \
            -sdk iphoneos \
            -allowProvisioningUpdates \
            -authenticationKeyPath $RUNNER_TEMP/key.p8 \
            archive 2>&1 | tee build.log || true

          # Si archive falla, hacer build simple para debug
          if [ ! -d "build/App.xcarchive" ]; then
            echo "Archive failed, attempting simple build..."
            xcodebuild \
              -scheme App \
              -configuration Release \
              -sdk iphoneos \
              -derivedDataPath build/DerivedData \
              build
          fi

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: iOS-Build
          path: |
            ios/App/build/App.xcarchive
            ios/App/build/DerivedData/Build/Products
            ios/App/build.log
        if: always()
